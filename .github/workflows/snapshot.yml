name: Refresh fixture snapshots

# Fetches dated snapshots of BOTH sources (swapi.info → tests/fixtures/swapi/,
# akabab → tests/fixtures/akabab/) and commits them back to the branch it ran
# on. One run refreshes the pair so cross-source baselines stay coherent.
# Exists because some dev environments can't reach the sources directly.
# workflow_dispatch only registers once this file is on the default branch,
# so it also fires on pushes that touch the workflow itself.
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/snapshot.yml"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" -c requirements.lock
      - name: Fetch snapshot
        run: python scripts/snapshot_fixtures.py
      # The bot's push never triggers ci.yml (GITHUB_TOKEN commits don't fire
      # workflows), so this step IS the CI for a refreshed snapshot: the full
      # suite must be green before the fixtures are allowed onto the branch.
      - name: Run the full suite against the fresh snapshot
        run: pytest -v
      - name: Commit fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/fixtures/swapi tests/fixtures/akabab
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "Freeze dated fixture snapshots, both sources (via snapshot workflow)"
            git push
          }
