name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        # -c pins every transitive dep to requirements.lock so today's green
        # suite is still reproducible when dagster/duckdb move underneath us
        run: pip install -e ".[dev]" -c requirements.lock
      # The whole suite is offline by design: assets run against committed
      # fixtures via an injected fake SWAPIResource. No network, no flakes.
      - name: Test
        run: pytest -v
